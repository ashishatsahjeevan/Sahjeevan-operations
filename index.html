<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sahjeevan Operations</title>
<meta name="theme-color" content="#1d2b50">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans+Gujarati:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ============================================================
   SAHJEEVAN OPERATIONS
   Palette grounded in Kachchh/Banni: Ajrakh indigo, grassland
   green, salt/sand neutrals, madder red used sparingly.
   ============================================================ */
:root{
  --indigo:#1d2b50;--indigo-700:#2a3d6e;--indigo-500:#3c558f;
  --grass:#4f7d3f;--grass-soft:#e8f0e2;
  --madder:#a23b24;--madder-soft:#f6e6e0;
  --amber:#c8861a;--amber-soft:#f8eed8;
  --sand:#f3efe6;--bone:#fbf9f4;
  --ink:#222630;--ink-soft:#5a6072;
  --line:#e2ddd0;--line-strong:#cfc8b6;--white:#ffffff;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 2px rgba(29,43,80,.06),0 8px 24px rgba(29,43,80,.06);
  --shadow-lg:0 12px 40px rgba(29,43,80,.16);
  --font:"Hanken Grotesk","Noto Sans Devanagari","Noto Sans Gujarati",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--sand);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45}
:lang(hi),:lang(gu){font-weight:400}
button{font-family:inherit;cursor:pointer}
a{color:var(--indigo-500)}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.01em}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
:focus-visible{outline:3px solid var(--amber);outline-offset:2px;border-radius:4px}

.login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
.login-card{background:var(--bone);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-lg);max-width:440px;width:100%;overflow:hidden}
.login-head{background:var(--indigo);color:#fff;padding:30px 30px 26px;position:relative}
.login-head .mark{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.login-head .mark .glyph{width:38px;height:38px;flex:none}
.login-head h1{font-size:21px;letter-spacing:-.02em}
.login-head p{margin:4px 0 0;color:#b9c4dd;font-size:13.5px}
.weave{height:8px;background:repeating-linear-gradient(135deg,var(--grass) 0 9px,var(--amber) 9px 18px,var(--madder) 18px 27px,var(--indigo-500) 27px 36px)}
.login-body{padding:24px 30px 30px}
.login-body label{font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em}
.login-hint{margin:8px 0 0;font-size:13px;color:var(--ink-soft);line-height:1.5}
.login-status{margin-top:16px;font-size:13px;line-height:1.5;text-align:center}
.login-status.err{color:var(--madder)}
.login-status.busy{color:var(--ink-soft)}
.login-setup{margin-top:16px;font-size:12.5px;color:var(--ink-soft);background:var(--amber-soft);border:1px solid #ecd9a8;border-radius:10px;padding:12px 13px;line-height:1.55;text-align:left}
.login-setup b{color:var(--ink)}
.login-setup code{background:#fff;border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:11.5px}


.app{display:none;min-height:calc(100vh - 33px)}
.app.on{display:grid;grid-template-columns:230px 1fr}
.sidebar{background:var(--indigo);color:#cdd6ea;display:flex;flex-direction:column;position:sticky;top:0;height:calc(100vh - 33px)}
.brand{padding:18px 18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .glyph{width:30px;height:30px;flex:none}
.brand b{color:#fff;font-size:16px;letter-spacing:-.01em;line-height:1.1}
.brand small{display:block;color:#8c9bc0;font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.nav{padding:12px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex:1}
.nav .grp{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6f7ea6;padding:12px 12px 5px}
.nav button{background:transparent;border:0;color:#cdd6ea;text-align:left;padding:9px 12px;border-radius:9px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:11px;width:100%;transition:background .12s,color .12s}
.nav button .ic{width:18px;height:18px;flex:none;opacity:.85}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.active{background:var(--bone);color:var(--indigo);font-weight:700}
.nav button.active .ic{opacity:1}
.side-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08)}
.side-foot .who{font-size:13px;color:#fff;font-weight:600}
.side-foot .who small{display:block;color:#8c9bc0;font-weight:500;font-size:11.5px}
.side-foot button{margin-top:9px;width:100%;background:rgba(255,255,255,.08);border:0;color:#dfe6f5;padding:8px;border-radius:8px;font-size:12.5px;font-weight:600}
.side-foot button:hover{background:rgba(255,255,255,.16)}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--bone);border-bottom:1px solid var(--line);padding:13px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
.topbar h2{font-size:17px;flex:1;min-width:0}
.topbar h2 span{display:block;font-size:12px;color:var(--ink-soft);font-weight:500}
.lang{display:flex;background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:2px;gap:2px}
.lang button{border:0;background:transparent;padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.lang button.on{background:var(--indigo);color:#fff}
.content{padding:22px;max-width:1180px;width:100%;margin:0 auto}

.mobnav{display:none}.hamb{display:none}

.card{background:var(--bone);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:18px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field label{font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.field .req{color:var(--madder)}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--line-strong);border-radius:9px;padding:10px 11px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--indigo-500);box-shadow:0 0 0 3px rgba(60,85,143,.14)}
textarea{resize:vertical;min-height:64px}
.btn{border:0;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;background:var(--indigo);color:#fff;display:inline-flex;align-items:center;gap:8px;transition:transform .1s,filter .12s}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn.ghost{background:#fff;color:var(--indigo);border:1px solid var(--line-strong)}
.btn.grass{background:var(--grass)}.btn.madder{background:var(--madder)}
.btn.sm{padding:7px 12px;font-size:12.5px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.pagehead{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.pagehead h3{font-size:19px}
.pagehead p{margin:3px 0 0;color:var(--ink-soft);font-size:13.5px}
.pagehead .sp{flex:1}

.pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap}
.pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.draft{background:#eceae3;color:#7a7565}
.pill.pending{background:var(--amber-soft);color:#9a6712}
.pill.approved{background:var(--grass-soft);color:#3a5e2e}
.pill.rejected{background:var(--madder-soft);color:#82301c}
.pill.booked{background:#e2e9f7;color:#2a3d6e}
.pill.progress{background:#e0eef0;color:#1c6470}
.pill.completed{background:#e7e4ee;color:#4b3d6e}
.pill.issued{background:var(--amber-soft);color:#9a6712}
.pill.returned{background:var(--grass-soft);color:#3a5e2e}
.pill.overdue{background:var(--madder-soft);color:#82301c}

.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--bone)}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:700;padding:11px 13px;border-bottom:1px solid var(--line);background:#f7f4ec}
td{padding:11px 13px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:0}
tr:hover td{background:#faf8f2}
.muted{color:var(--ink-soft)}
.kvs{display:flex;flex-direction:column;gap:7px;font-size:13.5px}
.kvs div{display:flex;gap:8px}
.kvs span{color:var(--ink-soft);min-width:140px;font-weight:600;font-size:12.5px}

.stat{display:flex;flex-direction:column;gap:2px;background:var(--bone);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow)}
.stat .n{font-size:26px;font-weight:800;letter-spacing:-.02em}
.stat .l{font-size:12px;color:var(--ink-soft);font-weight:600}
.stat.g .n{color:var(--grass)}.stat.a .n{color:var(--amber)}.stat.i .n{color:var(--indigo)}.stat.m .n{color:var(--madder)}

.notice{border-radius:var(--radius);padding:13px 15px;font-size:13.5px;display:flex;gap:11px;align-items:flex-start;line-height:1.5}
.notice svg{width:18px;height:18px;flex:none;margin-top:1px}
.notice.info{background:#e9eefb;color:#2a3d6e;border:1px solid #cdd9f3}
.notice.warn{background:var(--amber-soft);color:#7d5510;border:1px solid #ecd9a8}
.notice.privacy{background:var(--grass-soft);color:#33502a;border:1px solid #c6dcb8}

.minirow{display:grid;grid-template-columns:26px 1fr 90px 90px auto;gap:8px;align-items:center;margin-bottom:8px}
.minirow .idx{width:26px;height:26px;border-radius:7px;background:var(--indigo);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
.minirow .x{background:#fff;border:1px solid var(--line-strong);color:var(--madder);border-radius:8px;padding:0;width:34px;height:38px;font-size:18px;line-height:1}
.travrow{display:grid;grid-template-columns:26px 1fr auto;gap:8px;align-items:center;margin-bottom:8px}

/* real map containers */
#movementMap{height:440px;border:1px solid var(--line);border-radius:var(--radius);z-index:1}
#leafletPick{height:320px;border-radius:12px;overflow:hidden;border:1px solid var(--line);z-index:1}
.leaflet-container{font-family:var(--font)}
.filterbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.chk{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:600;cursor:pointer;user-select:none}
.chk input{width:auto;margin:0}
.chk.off{opacity:.45;text-decoration:line-through}

.modal-bg{position:fixed;inset:0;background:rgba(20,28,52,.5);display:none;place-items:center;z-index:1000;padding:18px}
.modal-bg.on{display:grid}
.modal{background:var(--bone);border-radius:16px;max-width:560px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow-lg)}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.modal-head h3{flex:1;font-size:17px}
.modal-head .x{background:#fff;border:1px solid var(--line-strong);border-radius:8px;width:32px;height:32px;font-size:18px}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:var(--indigo);color:#fff;padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);z-index:2000;opacity:0;transition:transform .25s,opacity .25s;max-width:90vw;text-align:center}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
.hide{display:none!important}

.confgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.taglist{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.tag{background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:600;display:flex;gap:7px;align-items:center}
.tag button{border:0;background:transparent;color:var(--madder);font-size:15px;line-height:1;padding:0}

.pickreadout{display:flex;gap:14px;align-items:center;margin-top:10px;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap}
.pickreadout b{color:var(--ink)}
.slip-preview{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px;font-size:13px;color:#000}
.slip-preview h4{font-size:15px;border-bottom:2px solid #000;padding-bottom:6px;margin:0 0 10px}
.slip-preview .grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 18px;margin-bottom:10px;font-size:12.5px}
.slip-preview table{width:100%;border:1px solid #000;font-size:11.5px;border-collapse:collapse;margin-top:6px}
.slip-preview th,.slip-preview td{border:1px solid #000;padding:5px}
.field-card{display:flex;gap:12px;align-items:center;background:var(--bone);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow);min-width:230px}
.field-card .vic{width:38px;height:38px;border-radius:9px;background:var(--indigo);color:#fff;display:grid;place-items:center;flex:none}
.field-card .vic svg{width:20px;height:20px}
.field-card b{font-size:13.5px;display:block}
.field-card .sub{font-size:11.5px;color:var(--ink-soft)}

@media (max-width:860px){
  .app.on{grid-template-columns:1fr}
  .sidebar{display:none}
  .hamb{display:inline-grid;place-items:center;width:38px;height:38px;border:1px solid var(--line-strong);background:#fff;border-radius:9px}
  .content{padding:16px 14px 90px}
  .grid2,.grid3,.confgrid{grid-template-columns:1fr}
  .minirow{grid-template-columns:24px 1fr auto;grid-auto-rows:auto}
  .minirow .lat,.minirow .lng{grid-column:2}
  .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bone);border-top:1px solid var(--line);z-index:60;padding:6px 6px env(safe-area-inset-bottom);justify-content:space-around}
  .mobnav button{background:transparent;border:0;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ink-soft);font-size:10.5px;font-weight:600;padding:6px 8px;border-radius:9px;flex:1}
  .mobnav button .ic{width:21px;height:21px}
  .mobnav button.active{color:var(--indigo);background:var(--grass-soft)}
  .drawer-bg{position:fixed;inset:0;background:rgba(20,28,52,.5);z-index:90;display:none}
  .drawer-bg.on{display:block}
  .drawer{position:fixed;top:0;left:0;bottom:0;width:264px;background:var(--indigo);z-index:100;transform:translateX(-100%);transition:transform .22s;display:flex;flex-direction:column}
  .drawer.on{transform:none}
}
@media (min-width:861px){.drawer,.drawer-bg{display:none!important}}

@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{position:absolute;inset:0;padding:0;background:#fff;display:block!important}
}
#printArea{display:none}
.slip{max-width:720px;margin:0 auto;padding:28px;font-size:13px;color:#000}
.slip h2{font-size:18px;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:14px}
.slip .grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;margin-bottom:14px}
.slip .grid div{display:flex;gap:6px}
.slip .grid b{min-width:130px}
.slip table{width:100%;border:1px solid #000;font-size:12px;min-width:0}
.slip th,.slip td{border:1px solid #000;padding:6px}
.slip .signs{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:40px}
.slip .signs div{border-top:1px solid #000;padding-top:6px;font-size:11px;text-align:center}
/* ===== Production additions ===== */
.routechips{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 10px}
.routechips button{background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--indigo)}
.routechips button:hover{border-color:var(--indigo-500);background:#fbfcff}
.seg{display:flex;background:#fff;border:1px solid var(--line-strong);border-radius:10px;padding:3px;gap:3px;flex-wrap:wrap}
.seg button{border:0;background:transparent;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink-soft)}
.seg button.on{background:var(--indigo);color:#fff}
.vendorbox{background:var(--amber-soft);border:1px solid #ecd9a8;border-radius:var(--radius);padding:13px 15px;margin-top:10px}
.logoprev{width:54px;height:54px;border-radius:12px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;overflow:hidden}
.logoprev img{width:100%;height:100%;object-fit:contain}
.subtabs{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 16px;border-bottom:1px solid var(--line);padding-bottom:0}
.subtabs button{background:transparent;border:0;border-bottom:2px solid transparent;padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:-1px}
.subtabs button.on{color:var(--indigo);border-bottom-color:var(--indigo)}
.contactline{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft)}
.contactline a{font-weight:600}
.editbadge{font-size:10.5px;font-weight:700;color:var(--amber);background:var(--amber-soft);border:1px solid #ecd9a8;padding:2px 7px;border-radius:999px}
.pill.cancelled{background:#eceae3;color:#7a7565}
.pill.leave_pending{background:var(--amber-soft);color:#9a6712}
.pill.leave_approved{background:var(--grass-soft);color:#3a5e2e}
.pill.leave_rejected{background:var(--madder-soft);color:#82301c}

</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginView">
  <div class="login-card">
    <div class="login-head">
      <div class="mark">
        <span class="glyph" data-glyph><svg viewBox="0 0 40 40" fill="none"><path d="M6 30c4-10 8-15 14-15s10 5 14 15" stroke="#9fd17e" stroke-width="3" stroke-linecap="round"/><path d="M10 30c3-6 6-9 10-9s7 3 10 9" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><circle cx="20" cy="9" r="3.5" fill="#e0a93f"/></svg></span>
        <div><h1>Sahjeevan Operations</h1></div>
      </div>
      <p data-i18n="login_sub">Field logistics, assets &amp; movement — one safe digital trail.</p>
    </div>
    <div class="weave"></div>
    <div class="login-body">
      <label data-i18n="login_label">Sign in to continue</label>
      <p class="login-hint" data-i18n="login_hint">Use your Sahjeevan Google account. Your access is set by your role in the staff directory.</p>
      <div id="gsiButton" style="margin-top:14px;display:flex;justify-content:center;min-height:44px"></div>
      <div id="loginStatus" class="login-status"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <aside class="sidebar">
    <div class="brand">
      <span class="glyph" data-glyph><svg viewBox="0 0 40 40" fill="none"><path d="M6 30c4-10 8-15 14-15s10 5 14 15" stroke="#9fd17e" stroke-width="3" stroke-linecap="round"/><path d="M10 30c3-6 6-9 10-9s7 3 10 9" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><circle cx="20" cy="9" r="3.5" fill="#e0a93f"/></svg></span>
      <div><b>Sahjeevan</b><small>Operations</small></div>
    </div>
    <nav class="nav" id="navDesktop"></nav>
    <div class="side-foot">
      <div class="who" id="whoName">—<small id="whoRole"></small></div>
      <button onclick="logout()" data-i18n="logout">Sign out</button>
    </div>
  </aside>

  <div class="drawer-bg" id="drawerBg" onclick="toggleDrawer(false)"></div>

/* Single secure gateway. In live mode every read/write + every email
   goes through the Apps Script Web App (which is the only thing that can
   write the Sheet and the only thing that can send mail). */
async function api(action, payload){
  if(CONFIG.USE_LIVE_BACKEND){
    try{
      const controller = new AbortController();
      const timer = setTimeout(()=>controller.abort(), 20000); // 20s safety timeout
      const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({action, payload, token: AUTH.idToken}),
        redirect:"follow",
        signal: controller.signal
      });
      clearTimeout(timer);
      const text = await res.text();
      console.log("[api]", action, "→ status", res.status, "| first 80 chars:", text.slice(0,80));
      // Apps Script returns an HTML login page if not authorised — detect that
      if(text.trim().startsWith("<")){
        return {ok:false, error:"AUTH_HTML"};
      }
      try{ return JSON.parse(text); }
      catch(e){ console.warn("[api] JSON parse failed for", action, text.slice(0,200)); return {ok:false, error:"BAD_JSON"}; }
    }catch(err){
      console.warn("[api] fetch failed for", action, err.name, err.message);
      return {ok:false, error: err.name==="AbortError" ? "TIMEOUT" : "NETWORK"};
    }
  }
  return demoApi(action, payload);
}

/* Safe list fetch — returns the array, or throws a clean error the
   render() catch turns into a helpful on-screen message. */
async function apiData(action, payload){
  const res = await api(action, payload);
  if(res && res.ok===false){
    const msgs={AUTH_HTML:"Backend needs authorisation (deployment access).",
      TIMEOUT:"Backend timed out — check the deployment URL.",
      NETWORK:"Network/CORS error reaching the backend.",
      BAD_JSON:"Backend returned an unexpected response."};
    throw new Error(msgs[res.error]||res.error||"Backend error");
  }
  return (res && res.data) ? res.data : [];
}

/* Email events are *triggered* here and actually *sent* by Apps Script.
   In demo mode we just show a toast + write to the change log so you can
   see exactly who would be emailed. */
async function notify(event, payload){
  if(CONFIG.USE_LIVE_BACKEND){
    try{ await api("sendEmail",{event,payload}); }catch(e){}
  }
  const map={
    request_raised:"📧 Email → all approvers + admin",

    request_edited:"📧 Email → approvers + admin (re-approval needed)",
    vehicle_booked:"📧 Email → driver + issuer",

    asset_requested:"📧 Email → admin",
    asset_issued:"📧 Email → issuer",

    asset_returned:"📧 Email → issuer",
    leave_raised:"📧 Email → approver + admin",
    leave_decided:"📧 Email → requester + admin"
  };
  if(map[event]) toast(map[event]);
  log(AUTH&&AUTH.user?AUTH.user.email:"system","NOTIFY "+event);
}

/* ============================================================
   2b) DEMO API HANDLERS  (mirror your Apps Script doPost router)
   ============================================================ */
function demoApi(action, p){return new Promise(res=>setTimeout(()=>res(handleDemo(action,p)),120));}
function handleDemo(action,p){
  switch(action){
    case "getConfig": return {ok:true,data:DEMO_DB.config};
    case "setLogo":{ DEMO_DB.config.logo=p.logo; log(AUTH.user.email,"Updated app logo"); return {ok:true}; }
    case "listRequests": return {ok:true, data:DEMO_DB.requests};
    case "createRequest":{
      const r={id:"VR-"+(SEQ++), status:"pending", approvedBy:null, vehType:"internal", vendor:null,
               veh:null, driver:null, driverPhone:null, startKm:null, startTime:null, endKm:null, endTime:null, ...p};
      DEMO_DB.requests.unshift(r); log(p.by,"Raised vehicle request "+r.id); return {ok:true,data:r};
    }
    case "editRequest":{
      const r=DEMO_DB.requests.find(x=>x.id===p.id);
      if(!r) return {ok:false,error:"not found"};
      const wasApproved = r.status==="approved";
      Object.assign(r,p.fields);
      // Edit after approval => force re-approval (item 2)
      if(wasApproved){ r.status="pending"; r.approvedBy=null; r.reapproval=true; }
      log(AUTH.user.email,"Edited "+p.id+(wasApproved?" (re-approval required)":""));
      return {ok:true,data:{reapproval:wasApproved}};
    }
    case "cancelRequest":{
      const r=DEMO_DB.requests.find(x=>x.id===p.id); if(r){r.status="cancelled";}
      log(AUTH.user.email,"Cancelled "+p.id); return {ok:true};
    }
    case "decideRequest":{
      const r=DEMO_DB.requests.find(x=>x.id===p.id);
      if(r){ r.status=p.decision; if(p.decision==="approved")r.approvedBy=AUTH.user.email; if(p.reason)r.rejectReason=p.reason; }
      log(AUTH.user.email,(p.decision==="approved"?"Approved ":"Rejected ")+p.id); return {ok:true};
    }
    case "bookVehicle":{
      const r=DEMO_DB.requests.find(x=>x.id===p.id);
      Object.assign(r,{status:"booked",vehType:p.vehType,vendor:p.vendor||null,veh:p.veh,driver:p.driver,
                       driverPhone:p.driverPhone,startKm:p.startKm,startTime:p.startTime,endKm:null,endTime:null});
      DEMO_DB.kmLog.unshift({ts:new Date().toISOString().slice(0,10),vehicle:p.veh,reqId:p.id,startKm:p.startKm||null,endKm:null,km:null,driver:p.driver});
      log(AUTH.user.email,"Booked vehicle for "+p.id); return {ok:true};
    }
    case "startTrip":{
      const r=DEMO_DB.requests.find(x=>x.id===p.id);
      if(r){ if(!r.startTime)r.startTime=p.t; if(p.startKm)r.startKm=p.startKm; r.status="progress"; }
      log(AUTH.user.email,"Started trip "+p.id); return {ok:true};
    }
    case "closeTrip":{
      const r=DEMO_DB.requests.find(x=>x.id===p.id);
      Object.assign(r,{endKm:p.endKm,endTime:p.endTime,status:"completed"});
      const k=DEMO_DB.kmLog.find(x=>x.reqId===p.id);
      if(k){k.endKm=p.endKm; k.km=(p.endKm&&k.startKm)?(p.endKm-k.startKm):null;}
      log(AUTH.user.email,"Closed trip "+p.id+(p.endKm&&r.startKm?" ("+(p.endKm-r.startKm)+" km)":""));
      return {ok:true};
    }
    case "listAssets": return {ok:true,data:DEMO_DB.assets};
    case "issueAsset":{
      const a={id:"AS-"+(ASEQ++),status:"issued",issueValidated:false,returnValidated:false,returnRequested:false,returnDate:null,...p};
      DEMO_DB.assets.unshift(a); log(p.by,"Requested asset "+a.id); return {ok:true,data:a};
    }
    case "requestReturn":{
      const a=DEMO_DB.assets.find(x=>x.id===p.id); if(a)a.returnRequested=true;
      log(AUTH.user.email,"Requested return of "+p.id); return {ok:true};
    }
    case "validateAsset":{
      const a=DEMO_DB.assets.find(x=>x.id===p.id);
      if(p.kind==="issue")a.issueValidated=true;
      if(p.kind==="return"){a.returnValidated=true;a.status="returned";a.returnDate=p.returnDate;a.returnRequested=false;}
      log(AUTH.user.email,"Validated "+p.kind+" for "+p.id); return {ok:true};
    }
    case "listLeaves": return {ok:true,data:DEMO_DB.leaves};
    case "createLeave":{
      const l={id:"LV-"+(LSEQ++),status:"leave_pending",decidedDate:null,...p};
      DEMO_DB.leaves.unshift(l); log(p.by,"Raised leave "+l.id); return {ok:true,data:l};
    }
    case "decideLeave":{
      const l=DEMO_DB.leaves.find(x=>x.id===p.id);
      if(l){ l.status=p.decision; l.decidedDate=new Date().toISOString().slice(0,10); }
      log(AUTH.user.email,(p.decision==="leave_approved"?"Approved ":"Rejected ")+"leave "+p.id); return {ok:true};
    }
    case "listKm": return {ok:true,data:DEMO_DB.kmLog};
    case "log": return {ok:true,data:DEMO_DB.changeLog};
  }
  return {ok:false,error:"unknown action"};
}
function log(user,action){DEMO_DB.changeLog.unshift({ts:new Date().toISOString().slice(0,16).replace("T"," "),user,action});}

function todayISO(){return new Date().toISOString().slice(0,10);}

/* ===== Staff directory: always sourced from the Users sheet in live mode ===== */
let ACCOUNTS = [];
async function loadAccounts(){
  if(CONFIG.USE_LIVE_BACKEND){
    const live = await apiData("listUsers");          // reads the "Users" sheet tab
    ACCOUNTS = (Array.isArray(live)?live:[]).map(normalizeUser).filter(u=>u.email);
  }else{
    ACCOUNTS = DEMO_DB.users;                          // only used when backend is off
  }
  return ACCOUNTS;
}
/* Coerce Sheet string values ("TRUE"/"FALSE", comma projects) into real types */
function normalizeUser(u){
  const b=v=>v===true||String(v).toUpperCase()==="TRUE";
  return {email:String(u.email||"").trim().toLowerCase(), name:u.name, role:u.role,
    superAdmin:b(u.superAdmin),canApprove:b(u.canApprove),admin:b(u.admin),driver:b(u.driver),
    phone:u.phone, projects: Array.isArray(u.projects)?u.projects:String(u.projects||"").split(",").map(s=>s.trim()).filter(Boolean)};
}

/* ===== Google Identity Services ===== */
function configReady(){
  return CONFIG.GOOGLE_CLIENT_ID && CONFIG.GOOGLE_CLIENT_ID.indexOf("PASTE_")!==0;
}
function decodeJwt(token){
  try{
    const base=token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
    const json=decodeURIComponent(atob(base).split("").map(c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""));
    return JSON.parse(json);
  }catch(e){ return null; }
}
function initGoogleLogin(){
  const status=document.getElementById("loginStatus");
  if(!configReady()){
    // No Client ID yet — show exactly what to do, don't leave a dead button.
    document.getElementById("gsiButton").innerHTML="";
    status.className="login-status";
    status.innerHTML=`<div class="login-setup">
      <b>Google sign-in needs a one-time setup.</b><br>
      Create a free OAuth <b>Client ID</b> in Google Cloud Console, then paste it into
      <code>CONFIG.GOOGLE_CLIENT_ID</code> in this file. Step-by-step is in
      <b>ENABLE_GOOGLE_LOGIN.md</b>.</div>`;
    return;
  }
  // Wait until the GSI library is present
  if(!(window.google && google.accounts && google.accounts.id)){
    return setTimeout(initGoogleLogin, 200);
  }
  google.accounts.id.initialize({
    client_id: CONFIG.GOOGLE_CLIENT_ID,
    callback: handleGoogleCredential,
    auto_select: false,
    cancel_on_tap_outside: true,
    use_fedcm_for_prompt: true,
    itp_support: true
  });
  google.accounts.id.renderButton(
    document.getElementById("gsiButton"),
    {theme:"outline", size:"large", type:"standard", text:"continue_with", shape:"rectangular", logo_alignment:"left", width:300}
  );
}
async function handleGoogleCredential(resp){
  const status=document.getElementById("loginStatus");
  status.className="login-status busy"; status.textContent="Signing you in…";
  const claims=decodeJwt(resp.credential);
  if(!claims || !claims.email){
    status.className="login-status err"; status.textContent="Could not read your Google account. Please try again.";
    return;
  }
  const email=String(claims.email).trim().toLowerCase();
  // Optional domain guard
  if(CONFIG.ALLOWED_DOMAIN && claims.hd && claims.hd!==CONFIG.ALLOWED_DOMAIN){
    status.className="login-status err";
    status.textContent="Please use your "+CONFIG.ALLOWED_DOMAIN+" account.";
    return;
  }
  // Match the signed-in email to a row in the Users sheet → that decides the role.
  // Always load fresh here (boot-time load may have raced with page setup).
  let dirErr=null;
  try{ await loadAccounts(); }
  catch(e){
    // one retry after a short pause — Apps Script's first cold call can be slow
    await new Promise(r=>setTimeout(r,1200));
    try{ await loadAccounts(); }catch(e2){ dirErr=e2; }
  }
  if(dirErr || !ACCOUNTS.length){
    status.className="login-status err";
    status.innerHTML="Couldn't reach the staff directory.<br><span style='font-size:12px'>"+(dirErr?dirErr.message:"No users returned")+" — check the backend deployment, then retry.</span>";
    return;
  }
  const user=ACCOUNTS.find(u=>u.email===email);
  if(!user){
    status.className="login-status err";
    status.innerHTML="<b>"+email+"</b> isn't in the staff directory yet.<br>Ask a Super Admin to add you to the Users sheet.";
    return;
  }
  AUTH.credential=resp.credential;     // signed Google token (verify server-side later if desired)
  AUTH.idToken=email;                  // acting user the backend records
  enterApp(user);
}
function enterApp(user){
  AUTH.user=user;
  document.getElementById("loginView").style.display="none";
  document.getElementById("app").classList.add("on");
  document.getElementById("whoName").firstChild.textContent=user.name;
  document.getElementById("whoRole").textContent=user.role;
  document.getElementById("whoName2").textContent=user.name+" · "+user.role;
  applyBranding();
  buildNav();
  go(MENU.find(m=>m.show())?.id);
}
function logout(){
  AUTH.user=null; AUTH.credential=null; AUTH.idToken=null;
  if(configReady() && window.google && google.accounts && google.accounts.id){
    google.accounts.id.disableAutoSelect();
  }
  document.getElementById("app").classList.remove("on");
  document.getElementById("loginView").style.display="grid";
  const s=document.getElementById("loginStatus"); if(s){s.className="login-status";s.textContent="";}
}

let stopN=0,travN=0;
function addStop(prefill){
  if(stopN>=5)return null; stopN++;
  const d=document.createElement("div");d.className="minirow";d.dataset.s=stopN;
  d.innerHTML=`<div class="idx">${stopN}</div>
    <input placeholder="${t("place_name")}" class="snm" value="${prefill?prefill.name:''}">
    <input class="lat hide" value="${prefill?prefill.lat:''}">
    <input class="lng hide" value="${prefill?prefill.lng:''}">
    <div style="display:flex;gap:6px">
      <button class="x" type="button" style="width:auto;padding:0 10px;color:var(--indigo)" onclick="openMapPicker(this.closest('.minirow'))" title="${t('pick_on_map')}">📍</button>
      <button class="x" type="button" onclick="this.closest('.minirow').remove();reindex()" title="Remove">×</button>
    </div>`;
  document.getElementById("stops").appendChild(d);
  document.getElementById("addStopBtn").disabled=stopN>=5;
  return d;
}
function addFrequentStop(r){
  const row=addStop(r);
  if(!row){toast("Max 5 stops");return;}
  toast(r.name+" added");
}
function reindex(){[...document.querySelectorAll("#stops .minirow")].forEach((r,i)=>{r.querySelector(".idx").textContent=i+1});stopN=document.querySelectorAll("#stops .minirow").length;document.getElementById("addStopBtn").disabled=stopN>=5;}
function addTrav(){
  if(travN>=6)return;travN++;
  const d=document.createElement("div");d.className="travrow";
  d.innerHTML=`<div class="idx">${travN}</div><input placeholder="Name of traveller" class="tnm">
    <button class="x" type="button" onclick="this.parentNode.remove();travN=document.querySelectorAll('#travs .travrow').length;document.getElementById('addTravBtn').disabled=travN>=6">×</button>`;
  document.getElementById("travs").appendChild(d);
  document.getElementById("addTravBtn").disabled=travN>=6;
}
async function submitRequest(){
  const reason=val("f_reason"),date=val("f_date"),time=val("f_time");
  const err=document.getElementById("newErr");
  if(!reason||!date||!time){err.innerHTML=warnBox("Please fill date, time and reason before submitting.");return;}
  const stops=[...document.querySelectorAll("#stops .minirow")].map(r=>({n:r.querySelector(".snm").value||"Stop",lat:+r.querySelector(".lat").value||23.4,lng:+r.querySelector(".lng").value||69.6}));
  const travellers=[...document.querySelectorAll("#travs .tnm")].map(i=>i.value).filter(Boolean);
  if(!travellers.length){err.innerHTML=warnBox("Add at least 1 person travelling.");return;}
  const res=await api("createRequest",{by:AUTH.user.email,byName:AUTH.user.name,project:val("f_proj"),date,time,reason,
    budget:val("f_budget"),head:val("f_head"),nightHalt:val("f_night")==="yes",stops,travellers,people:travellers.length});
  await notify("request_raised",{id:res.data.id,approvers:DEMO_DB.approvalMatrix[AUTH.user.email]||[]});
  go("mine");
}
function warnBox(m){return `<div class="notice warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>${m}</div>`;}

/* ====== Leaflet map picker — map first, name on side, coords hidden (item 5) ====== */
let MAP_PICK=null, PICK_MARKER=null, PICK_TEMP=null, PICK_ROW=null;
function openMapPicker(rowEl){
  PICK_ROW=rowEl; PICK_TEMP=null;
  const exLat=parseFloat(rowEl.querySelector(".lat").value);
  const exLng=parseFloat(rowEl.querySelector(".lng").value);
  const exName=rowEl.querySelector(".snm").value;
  openModal(t("pick_on_map"),`
    <div style="display:grid;grid-template-columns:1fr;gap:10px">
      <div id="leafletPick"></div>
      <div class="field" style="margin:0">
        <label>${t("place_name")} <span class="req">*</span></label>
        <input id="pickPlaceName" placeholder="${t('place_name')}" value="${exName||''}">
      </div>
      <div style="display:flex;gap:8px">
        <input id="geoSearch" placeholder="Search a place (Hodka, Banni, Bhuj…)" onkeydown="if(event.key==='Enter'){event.preventDefault();geoSearch()}">
        <button class="btn sm" type="button" onclick="geoSearch()">Search</button>
      </div>
      <div id="geoMsg"></div>
    </div>`,
    `<button class="btn ghost" onclick="closeModal()">${t("cancel")}</button><button class="btn" onclick="confirmPick()">Use this location</button>`);
  setTimeout(()=>{
    const start=(!isNaN(exLat)&&!isNaN(exLng))?[exLat,exLng]:[23.6,69.75];
    MAP_PICK=L.map("leafletPick").setView(start,(!isNaN(exLat))?12:9);
    L.tileLayer(OSM_TILE,{attribution:OSM_ATTR,maxZoom:19}).addTo(MAP_PICK);
    if(!isNaN(exLat)&&!isNaN(exLng)) setPickMarker(exLat,exLng);
    MAP_PICK.on("click",e=>setPickMarker(e.latlng.lat,e.latlng.lng));
    setTimeout(()=>MAP_PICK.invalidateSize(),120);
  },90);
}
function setPickMarker(lat,lng){
  PICK_TEMP={lat,lng};                 // captured silently, not shown
  if(PICK_MARKER)MAP_PICK.removeLayer(PICK_MARKER);
  PICK_MARKER=L.marker([lat,lng]).addTo(MAP_PICK);
}
async function geoSearch(){
  const q=val("geoSearch"); if(!q)return;
  const msg=document.getElementById("geoMsg");
  msg.innerHTML='<p class="muted" style="font-size:12px;margin:4px 0 0">Searching…</p>';
  try{
    const url="https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=in&q="+encodeURIComponent(q);
    const res=await fetch(url,{headers:{Accept:"application/json"}});
    const data=await res.json();
    if(!data.length){msg.innerHTML=warnBox("No match found. Try a nearby town, or tap the map directly.");return;}
    const lat=+data[0].lat,lng=+data[0].lon;
    MAP_PICK.setView([lat,lng],12); setPickMarker(lat,lng);
    if(!val("pickPlaceName"))document.getElementById("pickPlaceName").value=q;
    msg.innerHTML="";
  }catch(err){ msg.innerHTML=warnBox("Search unreachable here. Tap the map to drop a point instead."); }
}
function confirmPick(){
  const name=val("pickPlaceName");
  if(!PICK_TEMP){toast("Tap the map or search to choose a point first");return;}
  if(!name){toast("Enter the place name");return;}
  PICK_ROW.querySelector(".snm").value=name;
  PICK_ROW.querySelector(".lat").value=PICK_TEMP.lat.toFixed(5);
  PICK_ROW.querySelector(".lng").value=PICK_TEMP.lng.toFixed(5);
  closeModal();toast("Location set");
}

async function viewList(mode){
  const r=(await apiData("listRequests"));

  if(mode==="mine")rows=r.filter(x=>x.by===AUTH.user.email);
  if(mode==="approve")rows=r.filter(x=>x.status==="pending");
  if(!rows.length)return emptyState(mode==="approve"?"Nothing waiting on you. New requests will appear here.":"You haven't raised any requests yet. Head to “New request”.");
  return `<div class="tablewrap"><table><thead><tr><th>ID</th><th>By</th><th>Date</th><th>Route</th><th>${t("status")}</th><th></th></tr></thead><tbody>
    ${rows.map(x=>`<tr><td><b>${x.id}</b>${x.reapproval?` <span class="editbadge">edited</span>`:""}<div class="muted">${x.project}</div></td>
      <td>${x.byName}</td><td>${x.date}<div class="muted">${x.time}</div></td>
      <td>${x.stops.map(s=>s.n).join(" → ")}</td>
      <td>${statusPill(x.status)}</td>

function rowActions(x,mode){
  let b=`<button class="btn ghost sm" onclick='openReq(${JSON.stringify(x.id)})'>${t("view")}</button>`;
  // Owner edit/cancel while not completed/cancelled (item 2)
  if(mode==="mine" && x.by===AUTH.user.email && !["completed","cancelled"].includes(x.status)){
    b+=` <button class="btn ghost sm" onclick='openEdit("${x.id}")'>${t("edit")}</button>
         <button class="btn madder sm" onclick='cancelReq("${x.id}")'>${t("cancel")}</button>`;
  }
  // Approve = approver; (print + approve already admin-restricted elsewhere, item 6)
  if(mode==="approve"&&x.status==="pending"){
    if(x.by===AUTH.user.email)return `<span class="muted" style="font-size:12px">You raised this — routes to another approver</span>`;
    b+=` <button class="btn grass sm" onclick='decide("${x.id}","approved")'>${t("approve")}</button>
         <button class="btn madder sm" onclick='askReject("${x.id}")'>${t("reject")}</button>`;
  }
  return b;
}

let VEH_TYPE="internal";
function setVehType(v){
  VEH_TYPE=v;
  document.querySelectorAll("#vehSeg button").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  document.getElementById("internalBox").classList.toggle("hide",v!=="internal");
  document.getElementById("externalBox").classList.toggle("hide",v!=="external");
}
function fillDriverPhone(){
  const sel=document.getElementById("b_drv"); if(!sel)return;
  const ph=sel.options[sel.selectedIndex]?.dataset.phone||"";
  if(document.getElementById("b_dphone")&&!val("b_dphone"))document.getElementById("b_dphone").value=ph;
}
async function doBook(id){
  let payload={id,vehType:VEH_TYPE,startKm:+val("b_skm")||null,startTime:val("b_stm")||null,driverPhone:val("b_dphone")||null};
  if(VEH_TYPE==="internal"){
    payload.veh=val("b_veh"); payload.driver=val("b_drv"); payload.vendor=null;
  }else{
    if(!val("v_name")||!val("v_contact")||!val("v_vehno")){document.getElementById("bookErr").innerHTML=warnBox("Fill vendor name, contact and vehicle no.");return;}
    payload.vendor={name:val("v_name"),contact:val("v_contact"),vehNo:val("v_vehno")};
    payload.veh=val("v_vehno")+" (vendor)"; payload.driver=val("v_driver")||"Vendor driver";
    payload.driverPhone=val("b_dphone")||val("v_contact");
  }
  await api("bookVehicle",payload);
  await notify("vehicle_booked",{id});
  closeModal();toast(statusText("booked")+" · driver & issuer emailed");render();
}

/* ====== Movement map ====== */
let MAP_MOVE=null, MOVE_REQS=[];
async function viewMap(){
  MOVE_REQS=(await apiData("listRequests")).filter(x=>["booked","approved","progress"].includes(x.status));
  const names=[...new Set(MOVE_REQS.flatMap(x=>x.travellers||[]))];
  const places=[...new Set(MOVE_REQS.flatMap(x=>x.stops.map(s=>s.n)))];
  return `
  <div class="notice info" style="margin-bottom:12px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 4l6 2 6-2v14l-6 2-6-2-6 2V6z"/></svg>
    Live OpenStreetMap. Every booked/approved/in-progress trip is drawn from captured GPS — a marker per stop and a dashed route line.</div>
  <div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin:8px 0 4px">PEOPLE</div>
  <div class="filterbar">${names.map(n=>`<label class="chk"><input type="checkbox" class="fp" data-name="${n}" checked onchange="this.closest('.chk').classList.toggle('off',!this.checked);redrawMovement()">${n}</label>`).join("")||'<span class="muted">No travellers</span>'}</div>
  <div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin:8px 0 4px">LOCATIONS</div>
  <div class="filterbar">${places.map(p=>`<label class="chk"><input type="checkbox" class="fl" data-place="${p}" checked onchange="this.closest('.chk').classList.toggle('off',!this.checked);redrawMovement()">${p}</label>`).join("")}</div>
  <div id="movementMap"></div>`;
}
function initMovementMap(requests){
  if(MAP_MOVE){MAP_MOVE.remove();MAP_MOVE=null;}
  MAP_MOVE=L.map("movementMap").setView([23.6,69.75],8);
  L.tileLayer(OSM_TILE,{attribution:OSM_ATTR,maxZoom:19}).addTo(MAP_MOVE);
  const bounds=[];
  requests.forEach(x=>{
    const pts=[];
    x.stops.forEach(s=>{
      const la=+s.lat, ln=+s.lng;
      if(isNaN(la)||isNaN(ln))return;               // skip bad coords but keep the rest (item 4 fix)
      L.marker([la,ln]).addTo(MAP_MOVE).bindPopup(`<b>${s.n}</b><br>${x.id} · ${x.byName}<br>${(x.travellers||[]).join(", ")||"—"}`);
      pts.push([la,ln]); bounds.push([la,ln]);
    });
    if(pts.length>1)L.polyline(pts,{color:"#1d2b50",weight:3,opacity:.6,dashArray:"6 6"}).addTo(MAP_MOVE);
  });
  if(bounds.length)MAP_MOVE.fitBounds(bounds,{padding:[45,45],maxZoom:11});
  setTimeout(()=>MAP_MOVE.invalidateSize(),150);
}
function redrawMovement(){
  const ppl=[...document.querySelectorAll(".fp:checked")].map(c=>c.dataset.name);
  const plc=[...document.querySelectorAll(".fl:checked")].map(c=>c.dataset.place);
  const filtered=MOVE_REQS
    .filter(x=>(x.travellers||[]).some(tt=>ppl.includes(tt)))
    .map(x=>({...x,stops:x.stops.filter(s=>plc.includes(s.n))}))
    .filter(x=>x.stops.length);
  initMovementMap(filtered);
}

      <div class="kvs" style="margin-top:6px">
        <div><span>Overdue asset reminders</span><select style="max-width:160px" onchange="toast('Saved')"><option>Daily until returned</option><option>Every 3 days</option></select></div>
        <div><span>Default language</span><select style="max-width:160px" onchange="setLang(this.value);toast('Saved')"><option value="en">English</option><option value="hi">हिंदी</option><option value="gu">ગુજરાતી</option></select></div>
      </div>
    </div>
  </div>
  <h3 style="font-size:15px;margin:20px 0 8px">Change log (audit trail)</h3>
  <div class="tablewrap"><table><thead><tr><th>When</th><th>Who</th><th>What</th></tr></thead><tbody>
  ${lg.map(l=>`<tr><td class="muted" style="white-space:nowrap">${l.ts}</td><td>${l.user}</td><td>${l.action}</td></tr>`).join("")}
  </tbody></table></div>`;
}
let LOGO_TEMP="";
function previewLogoFile(){
  const f=document.getElementById("logoFile").files[0]; if(!f)return;
  const rd=new FileReader();rd.onload=e=>{LOGO_TEMP=e.target.result;document.getElementById("logoPrev").innerHTML=`<img src="${LOGO_TEMP}">`;};rd.readAsDataURL(f);
}
function previewLogoUrl(){const u=val("logoUrl");if(u){LOGO_TEMP=u;document.getElementById("logoPrev").innerHTML=`<img src="${u}">`;}}
async function saveLogo(){
  if(!LOGO_TEMP){toast("Choose a file or paste a URL first");return;}
  await api("setLogo",{logo:LOGO_TEMP}); DEMO_DB.config.logo=LOGO_TEMP;
  applyBranding();toast("Logo saved");
}
async function resetLogo(){await api("setLogo",{logo:""});DEMO_DB.config.logo="";LOGO_TEMP="";applyBranding();render();toast("Logo reset");}
function tag(x){return `<span class="tag">${x}<button onclick="this.parentNode.remove();toast('Removed (demo)')">×</button></span>`;}
function addHead(){const v=val("newHead");if(!v)return;document.getElementById("headTags").insertAdjacentHTML("beforeend",tag(v));document.getElementById("newHead").value="";log(AUTH.user.email,"Added budget head '"+v+"'");toast("Budget head added");}
function addCat(){const v=val("newCat");if(!v)return;document.getElementById("catTags").insertAdjacentHTML("beforeend",tag(v));document.getElementById("newCat").value="";log(AUTH.user.email,"Added asset category '"+v+"'");toast("Category added");}

/* ============================================================
   7) shared helpers
   ============================================================ */
function statusPill(s){return `<span class="pill ${s}">${statusText(s)}</span>`;}
function val(id){const e=document.getElementById(id);return e?e.value.trim():"";}
function emptyState(msg){return `<div class="card card-pad" style="text-align:center;padding:40px 20px">
  <div style="font-size:30px;margin-bottom:8px">🌾</div><p class="muted" style="max-width:340px;margin:0 auto">${msg}</p></div>`;}
function postRender(){
  if(CURRENT==="new"){onProj();addTrav();}      // start travellers at 1 (item 11)
  if(CURRENT==="map"){setTimeout(()=>initMovementMap(MOVE_REQS),60);}
}

/* requisition slip — admin only (item 6) */
async function printSlip(id){
  if(!(AUTH.user.admin||AUTH.user.superAdmin)){toast("Only Admin can print the requisition slip");return;}
  const x=(await apiData("listRequests")).find(r=>r.id===id);
  const km=(x.endKm&&x.startKm)?(x.endKm-x.startKm):"—";
  const veh=x.vehType==="external"&&x.vendor?(x.vendor.vehNo+" · "+x.vendor.name+" (vendor)"):(x.veh||"—");
  const body=`
    <h4>${DEMO_DB.config.orgName} · Vehicle Requisition — ${x.id}</h4>
    <div class="grid">
      <div><b>Requested by:</b> ${x.byName}</div><div><b>Project:</b> ${x.project}</div>
      <div><b>Date / Time:</b> ${x.date} ${x.time}</div><div><b>Budget head:</b> ${x.head}</div>
      <div><b>Night halt:</b> ${x.nightHalt?"Yes":"No"}</div><div><b>Status:</b> ${statusText(x.status)}</div>
      <div><b>People travelling:</b> ${x.people||((x.travellers||[]).length)}</div><div><b>Approved by:</b> ${x.approvedBy||"—"}</div>
    </div>
    <div style="margin-bottom:8px"><b>Reason:</b> ${x.reason}</div>
    <div style="margin-bottom:8px"><b>Route:</b> ${x.stops.map(s=>s.n).join(" → ")}</div>
    <div style="margin-bottom:8px"><b>Travelling:</b> ${(x.travellers||[]).join(", ")||"—"}</div>
    <table><tr><th>Vehicle</th><th>Driver</th><th>Driver ☎</th><th>Start km/time</th><th>End km/time</th><th>Total km</th></tr>
      <tr><td>${veh}</td><td>${x.driver||"—"}</td><td>${x.driverPhone||"—"}</td><td>${x.startKm||"—"} / ${x.startTime||"—"}</td><td>${x.endKm||"—"} / ${x.endTime||"—"}</td><td>${km}</td></tr></table>`;
  document.getElementById("printArea").innerHTML=`<div class="slip">${body}<div class="signs"><div>Admin</div><div>Driver</div><div>Approver</div><div>Issuer</div></div></div>`;
  openModal("Requisition slip · "+x.id,`<div class="slip-preview">${body}</div>`,
    `<button class="btn ghost" onclick="closeModal()">${t("close")}</button><button class="btn" onclick="window.print()">🖨 Print / Save as PDF</button>`);
}

/* modal + toast */
function openModal(title,body,foot){
  document.getElementById("modal").innerHTML=`<div class="modal-head"><h3>${title}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">${body}</div><div class="modal-foot">${foot||`<button class="btn" onclick="closeModal()">${t("close")}</button>`}</div>`;
  document.getElementById("modalBg").classList.add("on");
}
function closeModal(){
  document.getElementById("modalBg").classList.remove("on");
  if(MAP_PICK){MAP_PICK.remove();MAP_PICK=null;PICK_MARKER=null;}
}
let toastT;
function toast(msg){const e=document.getElementById("toast");e.textContent=msg;e.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove("on"),2600);}

/* PWA service worker */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

/* boot */
(function boot(){
  if(!CONFIG.USE_LIVE_BACKEND){ ACCOUNTS = DEMO_DB.users; }
  // Staff directory is loaded fresh at sign-in (see handleGoogleCredential),
  // so we don't pre-fetch here — avoids a race with the Google library loading.
  initGoogleLogin();
})();

</script>
